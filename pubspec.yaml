name: pharmacy_system_app
description: "A professional Pharmacy Management System built with Flutter."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_local_notifications: ^17.1.1
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  smooth_page_indicator: ^2.0.1
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  dartz: ^0.10.1
  dio: ^5.3.3
  shared_preferences: ^2.2.1
  equatable: ^2.0.5
  get_it: ^7.6.4
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^10.1.0
  mobile_scanner: ^3.5.2
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  google_sign_in: ^6.1.6
  cloud_firestore: ^4.13.6
  firebase_messaging: ^14.7.10
  firebase_storage: ^11.5.6
  image_picker: ^1.0.7
  pdf: ^3.10.7
  printing: ^5.11.1
  fl_chart: ^0.66.0
  animate_do: ^3.3.4
  share_plus: ^7.2.2
  path_provider: ^2.1.1
  csv: ^6.0.0
  confetti: ^0.7.0
  lottie: ^3.1.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  generate: true
  assets:
   - assets/images/
   - assets/images/onboarding/
   - assets/translations/
   - assets/lottie/
